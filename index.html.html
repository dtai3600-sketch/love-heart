<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Địt con mẹ nhà mày</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 120, 170, 0.25), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 70, 130, 0.2), transparent 30%),
        linear-gradient(180deg, #120016 0%, #220022 45%, #09000d 100%);
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: white;
      user-select: none;
      cursor: pointer;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 90, 160, 0.35), rgba(255, 90, 160, 0.04) 60%, transparent 75%);
      filter: blur(20px);
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    .heart {
      position: relative;
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #ff2d75, #ff76a8);
      transform: rotate(-45deg);
      border-radius: 24px;
      box-shadow: 0 0 30px rgba(255, 70, 140, 0.55), 0 0 70px rgba(255, 70, 140, 0.25);
      animation: beat 1.2s ease-in-out infinite;
      z-index: 2;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -70px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: 70px;
    }

    .title {
      margin-top: 64px;
      font-size: clamp(28px, 6vw, 68px);
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
      text-shadow:
        0 0 12px rgba(255, 120, 180, 0.85),
        0 0 28px rgba(255, 80, 160, 0.55),
        0 0 48px rgba(255, 40, 130, 0.3);
      z-index: 2;
      opacity: 0;
      transform: translateY(18px) scale(0.96);
      transition: all 0.55s ease;
    }

    .title.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hint {
      margin-top: 14px;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      letter-spacing: 0.5px;
      z-index: 2;
      transition: opacity 0.35s ease;
    }

    .hint.hide {
      opacity: 0;
    }

    .floating-heart {
      position: absolute;
      pointer-events: none;
      color: #ff6ea8;
      text-shadow: 0 0 16px rgba(255, 90, 160, 0.8);
      animation: floatUp 2.4s linear forwards;
      z-index: 3;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #ff8cb8 65%, transparent 70%);
      pointer-events: none;
      animation: sparkFly 1.2s ease-out forwards;
      z-index: 3;
    }

    @keyframes beat {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      15% { transform: rotate(-45deg) scale(1.08); }
      30% { transform: rotate(-45deg) scale(0.98); }
      45% { transform: rotate(-45deg) scale(1.12); }
      60% { transform: rotate(-45deg) scale(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes floatUp {
      0% {
        transform: translate(-50%, 0) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--x)), calc(-1 * var(--y))) scale(1.6);
        opacity: 0;
      }
    }

    @keyframes sparkFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--sx), var(--sy)) scale(0.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap" id="scene">
    <div class="glow"></div>
    <div class="heart" id="mainHeart"></div>
    <div class="title" id="loveText">địt mẹ mày luôn đấy con chóaaa</div>
    <div class="hint" id="hint">ấn vào màn hình nhé</div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const loveText = document.getElementById('loveText');
    const hint = document.getElementById('hint');

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createFloatingHeart(x, y) {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.innerHTML = '❤';
      heart.style.left = x + 'px';
      heart.style.top = y + 'px';
      heart.style.fontSize = random(18, 42) + 'px';
      heart.style.setProperty('--x', random(-120, 120) + 'px');
      heart.style.setProperty('--y', random(120, 260) + 'px');
      scene.appendChild(heart);
      setTimeout(() => heart.remove(), 2400);
    }

    function createSpark(x, y) {
      for (let i = 0; i < 10; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        spark.style.setProperty('--sx', random(-90, 90) + 'px');
        spark.style.setProperty('--sy', random(-90, 90) + 'px');
        scene.appendChild(spark);
        setTimeout(() => spark.remove(), 1200);
      }
    }

    scene.addEventListener('click', (e) => {
      loveText.classList.add('show');
      hint.classList.add('hide');

      for (let i = 0; i < 14; i++) {
        createFloatingHeart(e.clientX, e.clientY);
      }
      createSpark(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
