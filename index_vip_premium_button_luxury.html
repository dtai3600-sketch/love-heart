<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>love luxury premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    :root {
      --pink-1: #ff5fa2;
      --pink-2: #ffc5de;
      --pink-3: #ff8fc0;
      --gold-1: #ffe8a3;
      --gold-2: #ffd36e;
      --bg-1: #120014;
      --bg-2: #220022;
      --bg-3: #08000c;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Quicksand', Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 95, 162, 0.18), transparent 25%),
        radial-gradient(circle at 80% 18%, rgba(255, 211, 110, 0.10), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(255, 143, 192, 0.12), transparent 25%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 48%, var(--bg-3) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
      z-index: 0;
      animation: blobMove 8s ease-in-out infinite;
    }

    body::before {
      width: 260px;
      height: 260px;
      left: -40px;
      top: 8%;
      background: rgba(255, 95, 162, 0.22);
    }

    body::after {
      width: 240px;
      height: 240px;
      right: -30px;
      bottom: 8%;
      background: rgba(255, 211, 110, 0.16);
      animation-delay: -4s;
    }

    #intro {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255, 130, 190, 0.10), transparent 34%),
        linear-gradient(180deg, #040006, #160017 60%, #09000d);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity 1s ease, visibility 1s ease;
    }

    #intro.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .intro-box {
      width: min(92vw, 760px);
      padding: 34px 26px;
      border-radius: 28px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 18px 50px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .intro-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff8fb;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .intro-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 5vw, 44px);
      color: white;
      text-align: center;
      line-height: 1.45;
      min-height: 2.9em;
      opacity: 0;
      transform: translateY(14px) scale(0.98);
      transition: opacity 0.85s ease, transform 0.85s ease, filter 0.85s ease;
      text-shadow:
        0 0 18px rgba(255, 190, 220, 0.22),
        0 0 32px rgba(255, 170, 205, 0.12);
      filter: brightness(1);
    }

    .intro-text.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: brightness(1.05);
    }

    .intro-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .intro-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.20);
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
      transition: all 0.35s ease;
    }

    .intro-dots span.active {
      width: 26px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff96c6, #ffe8a7);
      box-shadow: 0 0 18px rgba(255, 220, 170, 0.24);
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: pointer;
      isolation: isolate;
    }

    .floating-orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.65;
      animation: drift 9s ease-in-out infinite;
      z-index: 0;
    }

    .orb-1 {
      width: 140px;
      height: 140px;
      left: 8%;
      top: 18%;
      background: rgba(255, 130, 190, 0.18);
    }

    .orb-2 {
      width: 90px;
      height: 90px;
      right: 14%;
      top: 22%;
      background: rgba(255, 224, 160, 0.15);
      animation-delay: -2s;
    }

    .orb-3 {
      width: 120px;
      height: 120px;
      right: 10%;
      bottom: 18%;
      background: rgba(255, 130, 190, 0.14);
      animation-delay: -5s;
    }

    .center-wrap {
      position: relative;
      z-index: 2;
      width: min(92vw, 540px);
      padding: 28px 22px 30px;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 22px 70px rgba(0,0,0,0.40),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 65px rgba(255, 100, 170, 0.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
      user-select: none;
      overflow: hidden;
    }

    .center-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,214,150,0.28), rgba(255,120,190,0.16));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }

    .card-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .card-sparkles span {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 12px rgba(255,255,255,0.55);
      animation: twinkle 2.6s ease-in-out infinite;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #fff4fb;
      background: linear-gradient(90deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
      position: relative;
      z-index: 2;
    }

    .heart-glow {
      position: absolute;
      left: 50%;
      top: 134px;
      transform: translateX(-50%);
      width: 290px;
      height: 290px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 110, 168, 0.30), rgba(255, 110, 168, 0.04) 58%, transparent 72%);
      filter: blur(18px);
      animation: pulseGlow 2.8s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    .heart-floor {
      position: absolute;
      left: 50%;
      top: 290px;
      transform: translateX(-50%);
      width: 190px;
      height: 55px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,225,170,0.22), rgba(255,225,170,0.02) 60%, transparent 78%);
      filter: blur(14px);
      z-index: 1;
      pointer-events: none;
    }

    .heart-shell {
      position: relative;
      width: 156px;
      height: 156px;
      margin: 6px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .heart-ring {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(255,255,255,0), rgba(255,231,170,0.38), rgba(255,255,255,0), rgba(255,120,180,0.35), rgba(255,255,255,0));
      filter: blur(10px);
      animation: spinSlow 12s linear infinite;
      opacity: 0.95;
    }

    .heart {
      position: relative;
      width: 120px;
      height: 120px;
      background: linear-gradient(145deg, #ff3f86, #ff9bc8);
      transform: rotate(-45deg);
      border-radius: 24px;
      box-shadow:
        0 0 28px rgba(255, 90, 160, 0.48),
        0 0 78px rgba(255, 90, 160, 0.16),
        inset 0 0 18px rgba(255,255,255,0.16);
      animation: beat 1.15s ease-in-out infinite;
      overflow: hidden;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before { top: -60px; left: 0; }
    .heart::after { top: 0; left: 60px; }

    .heart-shine {
      position: absolute;
      width: 70px;
      height: 24px;
      background: rgba(255,255,255,0.25);
      filter: blur(6px);
      border-radius: 999px;
      top: 32px;
      left: 14px;
      transform: rotate(24deg);
      z-index: 3;
      pointer-events: none;
    }

    .title {
      margin: 42px 0 10px;
      font-family: 'Pacifico', cursive;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.18;
      background: linear-gradient(90deg, #ff8ec0 0%, #fff0b6 48%, #ff8ec0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 0 10px rgba(255, 130, 190, 0.60),
        0 0 28px rgba(255, 215, 130, 0.26);
      opacity: 0;
      transform: translateY(18px) scale(0.92);
      transition: all 0.65s ease;
      filter: brightness(1);
      padding: 0 10px;
      position: relative;
      z-index: 2;
    }

    .title.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: glowText 2.2s ease-in-out infinite;
    }

    .subtitle-main {
      margin: 2px auto 8px;
      max-width: 390px;
      font-size: 24px;
      font-weight: 700;
      color: #fff6fb;
      line-height: 1.45;
      position: relative;
      z-index: 2;
    }

    .subtitle-sub {
      margin: 0 auto 20px;
      max-width: 360px;
      font-size: 14px;
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      position: relative;
      z-index: 2;
    }

    .premium-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      padding: 16px 24px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,225,170,0.34);
      box-shadow:
        0 14px 30px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 22px rgba(255, 210, 140, 0.10);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.35s ease;
      z-index: 2;
    }

    .premium-button.hide {
      opacity: 0.2;
      transform: scale(0.96);
    }

    .premium-button .icon {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,102,153,0.95), rgba(255,208,133,0.95));
      box-shadow: 0 0 14px rgba(255,160,190,0.22);
      font-size: 13px;
      flex-shrink: 0;
    }

    .premium-button::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      z-index: -1;
    }

    .premium-button:hover {
      transform: translateY(-2px);
      box-shadow:
        0 18px 34px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 26px rgba(255, 210, 140, 0.14);
    }

    .lux-line {
      width: 110px;
      height: 4px;
      margin: 18px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,236,176,0.95), rgba(255,255,255,0));
      box-shadow: 0 0 18px rgba(255,230,170,0.35);
      opacity: 0.95;
      position: relative;
      z-index: 2;
    }

    .slow-float {
      position: absolute;
      pointer-events: none;
      font-size: 15px;
      opacity: 0.22;
      animation: slowFloat 8s ease-in-out infinite;
      z-index: 1;
    }

    .boom-heart {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 0 16px rgba(255, 120, 190, 0.9);
    }

    .cat {
      position: absolute;
      pointer-events: none;
      z-index: 6;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.35));
      animation: catFly 1.2s ease-out forwards;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,1), rgba(255,220,165,0.95) 55%, rgba(255,220,165,0) 75%);
      pointer-events: none;
      z-index: 4;
      animation: sparkleFly 900ms ease-out forwards;
    }

    @keyframes beat {
      0%, 100% { transform: rotate(-45deg) scale(1); }
      15% { transform: rotate(-45deg) scale(1.1); }
      30% { transform: rotate(-45deg) scale(0.98); }
      45% { transform: rotate(-45deg) scale(1.14); }
      60% { transform: rotate(-45deg) scale(1); }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: translateX(-50%) scale(0.94); opacity: 0.78; }
      50% { transform: translateX(-50%) scale(1.08); opacity: 1; }
    }

    @keyframes glowText {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.65); }
      100% { filter: brightness(1); }
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-20px) translateX(12px); }
    }

    @keyframes blobMove {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-16px) scale(1.08); }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    @keyframes slowFloat {
      0%,100% { transform: translateY(0px); opacity: 0.14; }
      50% { transform: translateY(-12px); opacity: 0.30; }
    }

    @keyframes catFly {
      0% {
        transform: translate(0, 0) scale(0.82) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.6) rotate(var(--rot));
        opacity: 0;
      }
    }

    @keyframes sparkleFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--sx), var(--sy)) scale(0.15);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="intro">
    <div class="intro-box">
      <div class="intro-badge">cinematic intro</div>
      <div class="intro-text" id="introText"></div>
      <div class="intro-dots" id="introDots">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>

    <div class="center-wrap">
      <div class="card-sparkles">
        <span style="left: 14%; top: 12%; animation-delay: 0s;"></span>
        <span style="left: 82%; top: 16%; animation-delay: .7s;"></span>
        <span style="left: 12%; top: 74%; animation-delay: 1.1s;"></span>
        <span style="left: 88%; top: 76%; animation-delay: 1.7s;"></span>
        <span style="left: 50%; top: 12%; animation-delay: .4s;"></span>
        <span style="left: 22%; top: 38%; animation-delay: 1.5s;"></span>
        <span style="left: 75%; top: 36%; animation-delay: .9s;"></span>
      </div>

      <div class="slow-float" style="left: 10%; top: 60%; animation-delay: .2s;">✦</div>
      <div class="slow-float" style="right: 12%; top: 58%; animation-delay: 1.2s;">✧</div>

      <div class="top-badge">✨ cute luxury chill ✨</div>
      <div class="heart-glow"></div>
      <div class="heart-floor"></div>

      <div class="heart-shell">
        <div class="heart-ring"></div>
        <div class="heart">
          <div class="heart-shine"></div>
        </div>
      </div>

      <div class="title" id="loveText">bé là ngoại lệ đẹp nhất của anh 💖</div>
      <div class="subtitle-main">không cần quá rực rỡ, chỉ cần là em</div>
      <div class="subtitle-sub">nhẹ thôi, nhưng đủ làm người ta muốn đứng lại lâu hơn một chút</div>

      <div class="premium-button" id="hint">
        <span class="icon">❤</span>
        <span>chạm vào đây đi</span>
      </div>

      <div class="lux-line"></div>
    </div>
  </div>

  <audio id="meowSound" preload="auto">
    <source src="meow.mp3" type="audio/mpeg">
  </audio>

  <audio id="bgMusic" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const scene = document.getElementById('scene');
    const loveText = document.getElementById('loveText');
    const hint = document.getElementById('hint');
    const meowSound = document.getElementById('meowSound');
    const bgMusic = document.getElementById('bgMusic');
    const intro = document.getElementById('intro');
    const introText = document.getElementById('introText');
    const introDots = document.querySelectorAll('#introDots span');

    const introLines = [
      'một chút dễ thương...',
      'một chút chill...',
      'một chút rung động...',
      'một chút ngọt như mèo kêu...',
      'và tất cả là dành cho em 💖'
    ];

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function setActiveDot(index) {
      introDots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    }

    async function runIntro() {
      for (let i = 0; i < introLines.length; i++) {
        setActiveDot(i);
        introText.classList.remove('show');
        await new Promise(resolve => setTimeout(resolve, 350));
        introText.textContent = introLines[i];
        introText.classList.add('show');
        await new Promise(resolve => setTimeout(resolve, 1700));
      }
      intro.classList.add('hide');
      setTimeout(() => {
        intro.style.display = 'none';
      }, 1000);
    }

    function startBgMusic() {
      if (!bgMusic) return;
      bgMusic.volume = 0.35;
      bgMusic.play().catch(() => {});
    }

    function playCuteMeow() {
      if (!meowSound) return;
      meowSound.volume = 0.9;
      meowSound.currentTime = 0;
      meowSound.play().catch(() => {});
    }

    function createExplosion(x, y) {
      for (let i = 0; i < 30; i++) {
        const heart = document.createElement('div');
        heart.className = 'boom-heart';
        heart.innerHTML = '❤';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.color = Math.random() > 0.5 ? '#ff5c9e' : '#ffd89a';
        heart.style.fontSize = random(16, 44) + 'px';

        const angle = Math.random() * Math.PI * 2;
        const distance = random(100, 230);
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;

        heart.animate(
          [
            { transform: 'translate(0,0) scale(0.8)', opacity: 1 },
            { transform: `translate(${dx}px, ${dy}px) scale(1.7)`, opacity: 0 }
          ],
          { duration: 950, easing: 'ease-out' }
        );

        scene.appendChild(heart);
        setTimeout(() => heart.remove(), 950);
      }
    }

    function createCats(x, y) {
      const cats = ['🐱', '😺', '😸', '😻', '🐈'];
      for (let i = 0; i < 12; i++) {
        const cat = document.createElement('div');
        cat.className = 'cat';
        cat.innerHTML = cats[Math.floor(Math.random() * cats.length)];
        cat.style.left = x + 'px';
        cat.style.top = y + 'px';
        cat.style.fontSize = random(24, 42) + 'px';
        cat.style.setProperty('--dx', random(-185, 185) + 'px');
        cat.style.setProperty('--dy', random(-185, 185) + 'px');
        cat.style.setProperty('--rot', random(-220, 220) + 'deg');
        scene.appendChild(cat);
        setTimeout(() => cat.remove(), 1200);
      }
    }

    function createSparkles(x, y) {
      for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        sparkle.style.setProperty('--sx', random(-150, 150) + 'px');
        sparkle.style.setProperty('--sy', random(-150, 150) + 'px');
        scene.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 900);
      }
    }

    document.addEventListener('click', () => {
      startBgMusic();
    }, { once: true });

    scene.addEventListener('click', (e) => {
      loveText.classList.add('show');
      hint.classList.add('hide');
      startBgMusic();
      playCuteMeow();
      createExplosion(e.clientX, e.clientY);
      createCats(e.clientX, e.clientY);
      createSparkles(e.clientX, e.clientY);
    });

    runIntro();
  </script>
